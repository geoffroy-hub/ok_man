<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0C3320">
  <title>404 — Page introuvable | Miralocks</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="error-page">
    <div class="error-inner">
      <div class="error-logo">
        <picture>
          <source srcset="assets/logo-transparent.webp" type="image/webp">
          <img src="assets/logo-transparent.png" alt="Miralocks" width="48" height="48">
        </picture>
      </div>
      <div class="error-code">404</div>
      <h1 class="error-title">Page introuvable</h1>
      <p class="error-desc">La page que vous cherchez n'existe pas ou a été déplacée.</p>
      <div class="error-countdown-wrap">
        <div class="error-countdown-ring">
          <svg viewBox="0 0 44 44">
            <circle cx="22" cy="22" r="18" fill="none" stroke="rgba(201,168,76,.2)" stroke-width="3" />
            <circle cx="22" cy="22" r="18" fill="none" stroke="#C9A84C" stroke-width="3" stroke-dasharray="113"
              stroke-dashoffset="0" id="ring" stroke-linecap="round"
              style="transform:rotate(-90deg);transform-origin:center" />
          </svg>
          <span id="countdown-n">5</span>
        </div>
        <p class="error-redirect-txt">Redirection automatique dans <strong id="countdown-s">5</strong>s</p>
      </div>
      <div class="error-actions">
        <a href="index.html" class="btn btn-or"><i class="fas fa-home"></i> Accueil</a>
        <a href="javascript:history.back()" class="btn btn-outline-light"><i class="fas fa-arrow-left"></i> Retour</a>
      </div>
      <div class="error-links">
        <a href="gallery.html">Galerie</a>
        <a href="services.html">Services</a>
        <a href="rendezvous.html">Réserver</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </div>
  <script>
    var n = 5, total = 113;
    var ring = document.getElementById('ring');
    var ns = document.getElementById('countdown-n');
    var ss = document.getElementById('countdown-s');
    var t = setInterval(function () {
      n--;
      if (ns) ns.textContent = n;
      if (ss) ss.textContent = n;
      if (ring) ring.style.strokeDashoffset = total - (total * (5 - n) / 5);
      if (n <= 0) { clearInterval(t); window.location.replace('index.html'); }
    }, 1000);
  </script>
  <script src="js/register-sw.js" defer></script>
</body>

</html>
