<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0C3320">
  <title>429 — Trop de requêtes | Miralocks</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">

<body>
  <div class="error-page">

        </picture>
      </div>
      <div class="error-icon-wrap"><i class="fas fa-exclamation-triangle"></i></div>
      <div class="error-code">429</div>

        <button onclick="window.location.reload()" class="btn btn-or"><i class="fas fa-redo"></i> Réessayer</button>
        <a href="index.html" class="btn btn-outline-light"><i class="fas fa-home"></i> Accueil</a>
