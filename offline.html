<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0C3320">
  <title>Hors ligne | Miralocks</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous">
  <style>
    :root {
      --vert: #0C3320;
      --vert-c: #1B6B45;
      --or: #C9A84C;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: Georgia, serif;
      background: var(--vert);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(201, 168, 76, .08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(27, 107, 69, .15) 0%, transparent 50%);
      pointer-events: none
    }

    .card {
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(201, 168, 76, .2);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 460px;
      width: 100%;
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 1
    }

    .icon-wrap {
      width: 90px;
      height: 90px;
      margin: 0 auto 1.75rem;
      background: rgba(201, 168, 76, .12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2.5s ease-in-out infinite
    }

    .icon-wrap i {
      font-size: 2.4rem;
      color: var(--or)
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(201, 168, 76, .3)
      }

      50% {
        transform: scale(1.05);
        box-shadow: 0 0 0 14px rgba(201, 168, 76, 0)
      }
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      margin-bottom: 2rem;
      opacity: .7
    }

    .logo img {
      width: 32px;
      height: 32px
    }

    .logo span {
      font-size: .85rem;
      letter-spacing: .04em;
      color: rgba(255, 255, 255, .6)
    }

    h1 {
      font-size: 1.6rem;
      color: #fff;
      margin-bottom: .75rem;
      line-height: 1.3
    }

    .subtitle {
      color: rgba(255, 255, 255, .65);
      font-size: .95rem;
      line-height: 1.6;
      margin-bottom: 2rem
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      padding: .75rem 1.25rem;
      border-radius: 999px;
      font-size: .85rem;
      font-weight: 600;
      margin-bottom: 2rem;
      transition: all .4s
    }

    .status-bar.offline {
      background: rgba(220, 38, 38, .15);
      border: 1px solid rgba(220, 38, 38, .3);
      color: #fca5a5
    }

    .status-bar.online {
      background: rgba(22, 163, 74, .18);
      border: 1px solid rgba(22, 163, 74, .35);
      color: #86efac
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .status-bar.offline .status-dot {
      background: #ef4444;
      animation: blink 1.2s ease infinite
    }

    .status-bar.online .status-dot {
      background: #22c55e
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .25
      }
    }

    .redirect-bar {
      display: none;
      margin-bottom: 1.5rem
    }

    .redirect-bar.show {
      display: block
    }

    .redirect-label {
      font-size: .82rem;
      color: rgba(255, 255, 255, .6);
      margin-bottom: .5rem
    }

    .redirect-progress {
      height: 4px;
      background: rgba(255, 255, 255, .1);
      border-radius: 999px;
      overflow: hidden
    }

    .redirect-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--or), #e8d080);
      border-radius: 999px;
      width: 0%;
      transition: width .08s linear
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .85rem 2rem;
      background: var(--or);
      color: var(--vert);
      border-radius: 999px;
      font-weight: 700;
      font-size: .95rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      margin-bottom: 1.75rem
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201, 168, 76, .35)
    }

    .contact-line {
      color: rgba(255, 255, 255, .4);
      font-size: .82rem
    }

    .contact-line a {
      color: var(--or);
      text-decoration: none
    }

    .contact-line a:hover {
      text-decoration: underline
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="logo">
      <picture>
        <source srcset="assets/logo-transparent.webp" type="image/webp">
        <img src="assets/logo-transparent.png" alt="Miralocks">
      </picture>
      <span>Miralocks</span>
    </div>

    <div class="icon-wrap">
      <i class="fas fa-wifi" id="icon-wifi"></i>
    </div>

    <h1 id="page-title">Vous êtes hors ligne</h1>
    <p class="subtitle">
      Pas de connexion internet détectée.<br>
      La page se rechargera automatiquement<br>dès que vous serez reconnecté.
    </p>

    <div class="status-bar offline" id="status-bar">
      <div class="status-dot"></div>
      <span id="status-text">Connexion absente</span>
    </div>

    <div class="redirect-bar" id="redirect-bar">
      <div class="redirect-label" id="redirect-label">Redirection vers l'accueil…</div>
      <div class="redirect-progress">
        <div class="redirect-fill" id="redirect-fill"></div>
      </div>
    </div>

    <a href="index.html" class="btn">
      <i class="fas fa-home"></i> Aller à l'accueil
    </a>

    <div class="contact-line">
      <i class="fas fa-phone" style="margin-right:.3rem"></i>
      <a href="tel:+22897989001">+228 97 98 90 01</a>
      &nbsp;·&nbsp;
      <a href="https://wa.me/22897989001" target="_blank" rel="noopener">
        <i class="fab fa-whatsapp"></i> WhatsApp
      </a>
    </div>

  </div>
  <script>
    (function () {
      var statusBar = document.getElementById('status-bar');
      var statusText = document.getElementById('status-text');
      var redirectBar = document.getElementById('redirect-bar');
      var redirectFill = document.getElementById('redirect-fill');
      var redirectLabel = document.getElementById('redirect-label');
      var iconWifi = document.getElementById('icon-wifi');
      var pageTitle = document.getElementById('page-title');
      var timer = null, interval = null, redirecting = false, wasOnline = false;

      /* ── Détection RÉELLE (bypasse le cache Service Worker) ──────
         fetch() en mode no-cors sur URL externe = le SW ne peut PAS
         intercepter les requêtes cross-origin → vrai test réseau.
      ────────────────────────────────────────────────────────────── */
      var PING_URLS = [
        'https://www.gstatic.com/generate_204',
        'https://connectivitycheck.gstatic.com/generate_204',
        'https://1.1.1.1/cdn-cgi/trace'
      ];

      function checkOnline() {
        return new Promise(function (resolve) {
          var resolved = false;
          var failed = 0;

          PING_URLS.forEach(function (url) {
            fetch(url + '?_=' + Date.now(), {
              method: 'HEAD',
              mode: 'no-cors',   // cross-origin → jamais intercepté par le SW
              cache: 'no-store',
            })
              .then(function () {
                if (!resolved) { resolved = true; resolve(true); }
              })
              .catch(function () {
                failed++;
                if (!resolved && failed >= PING_URLS.length) resolve(false);
              });
          });

          // Timeout global 6s
          setTimeout(function () {
            if (!resolved) { resolved = true; resolve(false); }
          }, 6000);
        });
      }

      function startRedirect() {
        if (redirecting) return;
        redirecting = true;
        statusBar.className = 'status-bar online';
        statusText.textContent = 'Connexion rétablie !';
        iconWifi.className = 'fas fa-wifi';
        pageTitle.textContent = 'Connexion rétablie !';
        redirectBar.classList.add('show');
        var pct = 0, duration = 3000, step = 60;
        interval = setInterval(function () {
          pct += (step / duration) * 100;
          redirectFill.style.width = Math.min(pct, 100) + '%';
          var secs = Math.max(1, Math.ceil((100 - pct) / 100 * duration / 1000));
          redirectLabel.textContent = 'Redirection dans ' + secs + ' seconde' + (secs > 1 ? 's' : '') + '…';
        }, step);
        timer = setTimeout(function () {
          clearInterval(interval);
          window.location.replace('index.html');
        }, duration);
      }

      function cancelRedirect() {
        if (!redirecting) return;
        redirecting = false;
        clearTimeout(timer);
        clearInterval(interval);
        redirectBar.classList.remove('show');
        redirectFill.style.width = '0%';
        statusBar.className = 'status-bar offline';
        statusText.textContent = 'Connexion perdue à nouveau…';
        iconWifi.className = 'fas fa-wifi-slash';
        pageTitle.textContent = 'Connexion interrompue';
      }

      function poll() {
        checkOnline().then(function (online) {
          if (online && !wasOnline) { wasOnline = true; startRedirect(); }
          if (!online && wasOnline) { wasOnline = false; cancelRedirect(); }
        });
      }

      // Événements navigateur (réaction immédiate)
      window.addEventListener('online', function () { setTimeout(poll, 300); });
      window.addEventListener('offline', function () { wasOnline = false; cancelRedirect(); });

      // Polling toutes les 4 secondes
      setInterval(poll, 4000);
      poll(); // vérification au chargement
    })();
  </script>
</body>

</html>
